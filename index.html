<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFBot Session HUD - OBS Overlay</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .source-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-top: 20px;
        }

        .requirement-banner {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            color: #fbbf24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .btn {
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
            font-size: 1.1rem;
        }

        .btn:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
        }

        .obs-info {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FFBot OBS Overlay</h1>
        <p>This is an example OBS overlay for FFBot stream integration.</p>

        <div class="source-box">
            <div class="requirement-banner">
                <strong>Important:</strong> This overlay requires the <strong>CSV and JSON mod</strong> to be installed and running to pull real-time game data.
            </div>

            <a href="session-hud-browser.html" class="btn">Launch Session HUD</a>

            <div class="obs-info">
                <strong>Recommended OBS Settings:</strong><br>
                Width: 320px | Height: 250px
            </div>
        </div>

        <footer>
            Created by <a href="https://github.com/enzemo" target="_blank">enzemo</a>
        </footer>
    </div>

</body>
</html>
