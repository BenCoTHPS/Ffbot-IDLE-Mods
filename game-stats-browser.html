<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS - Session HUD</title>
    <style>
        :root {
            --bg-color: #000000; 
            --bg-alpha: 0.9;
            --accent-color: #e9ac2e; 
            --text-main: #f1f5f9;
        }

        body {
            background: rgba(0,0,0,0);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            width: 320px;
            overflow: hidden;
        }

        .hud-wrapper {
            background: color-mix(in srgb, var(--bg-color) 90%, transparent);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            padding: 14px;
            border: 1px solid color-mix(in srgb, var(--accent-color) 30%, transparent);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }

        .main-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 2px solid color-mix(in srgb, var(--accent-color) 20%, transparent);
            padding-bottom: 6px;
        }

        .target-name {
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
            text-align: center;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.85rem;
            align-items: center;
        }

        .label {
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 0.8px;
        }

        .val {
            font-weight: bold;
            color: var(--accent-color);
            font-family: 'Segoe UI', sans-serif;
        }

        .bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(51, 65, 85, 0.8);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .footer-stats {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            border-top: 1px solid color-mix(in srgb, var(--accent-color) 20%, transparent);
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="hud-wrapper">
    <div class="main-header">
        <span class="target-name" id="target">WAITING...</span>
    </div>

    <div>
        <div class="row" style="margin-bottom: 0;">
            <span class="label">Wave Progress</span>
            <span class="val" id="wave-text">0 / 0</span>
        </div>
        <div class="bar-bg">
            <div id="wave-bar" class="bar-fill"></div>
        </div>
    </div>

    <div class="row" style="margin-top: 12px;">
        <span class="label">Attempts Remaining</span>
        <span class="val" id="attempts">-</span>
    </div>

    <div class="row">
        <span class="label">NG+ Level</span>
        <span class="val" id="ng-cycle">-</span>
    </div>

    <div class="row">
        <span class="label">!passive</span>
        <span class="val" id="passive">-</span>
    </div>

    <div class="row">
        <span class="label">!hire</span>
        <span class="val" id="hire">-</span>
    </div>
    
    <div class="row">
        <span class="label">NG+ Unlock</span>
        <span class="val" id="ng-unlock">-</span>
    </div>

    <div class="footer-stats">
        <div>
            <span class="label">Party</span>
            <div class="val"><span id="players">0</span> Units</div>
        </div>
        <div style="text-align: right;">
            <span class="label">Progress</span>
            <div class="val" id="comp">0%</div>
        </div>
    </div>
</div>

<script>
    // Configuration
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('bg')) document.documentElement.style.setProperty('--bg-color', '#' + urlParams.get('bg'));
    if(urlParams.has('accent')) document.documentElement.style.setProperty('--accent-color', '#' + urlParams.get('accent'));

    let nameMap = {};
    let ngUnlockMap = {};

    // 1. Function to fetch and parse the CSV
    async function loadNameMap() {
        try {
            const response = await fetch('FFBot.csv');
            const csvText = await response.text();
            
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            const headers = lines[0].split(',');
            
            const internalIdx = headers.indexOf('internal name');
            const displayIdx = headers.indexOf('Display name');
            const unlockIdx = headers.indexOf('NG Unlocks');
            const ngLevelIdx = headers.indexOf('NG level');

            lines.slice(1).forEach(line => {
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // Map names
                if (internalIdx !== -1 && displayIdx !== -1 && parts[internalIdx]) {
                    nameMap[parts[internalIdx].trim()] = parts[displayIdx].trim();
                }

                // Map NG Unlocks
                if (ngLevelIdx !== -1 && unlockIdx !== -1 && parts[ngLevelIdx]) {
                    const level = parts[ngLevelIdx].trim();
                    const unlock = parts[unlockIdx] ? parts[unlockIdx].trim() : "";
                    if(level) ngUnlockMap[level] = unlock;
                }
            });
            console.log("Data loaded successfully.");
        } catch (e) {
            console.error("Error loading CSV:", e);
        }
    }

    function updateHUD() {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "game_stats.json?t=" + Date.now(), true);
        
        xhr.onload = function () {
            if (xhr.status === 200 || (xhr.status === 0 && xhr.responseText)) {
                try {
                    const data = JSON.parse(xhr.responseText);

                    // Boss Name Replacement
                    const rawBossName = data.game_info.current_boss;
                    const displayName = nameMap[rawBossName] || rawBossName; 
                    document.getElementById('target').innerText = displayName.toUpperCase();

                    // Standard UI Updates
                    document.getElementById('wave-text').innerText = `${data.wave_info.current_wave} / ${data.wave_info.max_waves}`;
                    document.getElementById('wave-bar').style.width = data.wave_info.wave_progress_percent + '%';
                    document.getElementById('passive').innerText = data.run_info.current_passive || "None";
                    document.getElementById('hire').innerText = data.run_info.hire_system.current_hire || "None";
                    document.getElementById('players').innerText = data.game_info.players_in_run;
                    document.getElementById('comp').innerText = data.progression.completion_rate + '%';
                    
                    const pSystem = data.game_info.pity_system;
                    document.getElementById('attempts').innerText = pSystem ? pSystem.losses_until_ng_reduction : "N/A";
                    
                    // NG+ Math & Unlock Lookup
                    const rawCycle = parseInt(data.game_info.cycle);
                    if (!isNaN(rawCycle)) {
                        const adjustedCycle = Math.max(0, rawCycle - 1);
                        document.getElementById('ng-cycle').innerText = "Level " + adjustedCycle;
                        
                        // Set NG Unlock
                        document.getElementById('ng-unlock').innerText = ngUnlockMap[adjustedCycle] || "None";
                    } else {
                        document.getElementById('ng-cycle').innerText = "-";
                        document.getElementById('ng-unlock').innerText = "-";
                    }

                } catch (e) {
                    console.error("JSON Error:", e);
                }
            }
        };
        xhr.send();
    }

    // Initialize
    loadNameMap().then(() => {
        updateHUD();
        setInterval(updateHUD, 2000);
    });
</script>

</body>
</html>
